<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide Editor — AI & Art</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; color: #ddd; font-family: 'Inter', system-ui, sans-serif; overflow-x: auto; }
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');

  header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(10,10,15,0.95); border-bottom: 1px solid #222;
    padding: 8px 16px; display: flex; align-items: center; gap: 12px;
    backdrop-filter: blur(10px);
  }
  header h1 { font-size: 15px; font-weight: 600; color: #64b5f6; }
  header .spacer { flex: 1; }
  header button {
    background: #1a1a2e; border: 1px solid #333; color: #aaa;
    padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 12px;
  }
  header button:hover { background: #2a2a4e; color: #fff; }
  header button.primary { background: #2563eb; border-color: #3b82f6; color: #fff; }
  header button.primary:hover { background: #1d4ed8; }

  .grid {
    display: flex; gap: 32px; padding: 60px 24px 24px;
    align-items: flex-start; min-height: 100vh;
  }

  .col {
    display: flex; flex-direction: column; gap: 12px; align-items: center;
    min-width: 200px;
  }
  .col-label {
    font-size: 10px; color: #444; text-transform: uppercase; letter-spacing: 0.1em;
    text-align: center; width: 100%; padding: 4px 0;
    cursor: pointer; border-radius: 4px;
  }
  .col-label:hover { color: #64b5f6; }
  .col-num {
    font-size: 18px; font-weight: 800; color: #2563eb; margin-bottom: -2px;
  }

  .slide-mini {
    width: 200px; height: 112px;
    background: #12121f; border: 1px solid #2a2a3e; border-radius: 6px;
    padding: 10px; cursor: pointer; position: relative;
    overflow: hidden; transition: all 0.15s;
    display: flex; flex-direction: column;
  }
  .slide-mini:hover { border-color: #3b82f6; transform: scale(1.04); z-index: 10; }
  .slide-mini.active { border-color: #3b82f6; box-shadow: 0 0 20px rgba(59,130,246,0.3); }
  .slide-mini.has-instructions { border-color: #f59e0b; }
  .slide-mini.edited { border-left: 3px solid #4ade80; }

  .slide-mini .mini-heading {
    font-size: 10px; font-weight: 700; color: #fff;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 3px; line-height: 1.2;
  }
  .slide-mini .mini-body {
    font-size: 7px; color: #666; line-height: 1.4;
    overflow: hidden; flex: 1;
  }
  .slide-mini .mini-img {
    font-size: 7px; color: #3b82f6; margin-top: 2px;
  }
  .slide-mini .mini-badges {
    position: absolute; bottom: 4px; right: 4px;
    display: flex; gap: 3px;
  }
  .mini-badge {
    font-size: 7px; padding: 1px 4px; border-radius: 3px;
    background: rgba(255,255,255,0.08); color: #555;
  }
  .mini-badge.layout { color: #64b5f6; }
  .mini-badge.transition { color: #ce93d8; }
  .mini-badge.instruction { color: #f59e0b; background: rgba(245,158,11,0.15); }
  .mini-badge.edited { color: #4ade80; background: rgba(74,222,128,0.15); }

  .section-arrows {
    display: flex; gap: 4px; margin-top: 2px;
  }
  .section-arrows button {
    background: #1a1a2e; border: 1px solid #2a2a3e; color: #444;
    width: 28px; height: 22px; border-radius: 4px; cursor: pointer;
    font-size: 13px; display: flex; align-items: center; justify-content: center;
  }
  .section-arrows button:hover { color: #64b5f6; border-color: #3b82f6; }
  .section-arrows button:disabled { opacity: 0.2; cursor: default; }

  .expand-btn {
    position: absolute; top: 4px; right: 4px;
    background: rgba(255,255,255,0.1); border: none; color: #666;
    width: 18px; height: 18px; border-radius: 3px; cursor: pointer;
    font-size: 10px; display: none; align-items: center; justify-content: center;
  }
  .slide-mini:hover .expand-btn { display: flex; }
  .expand-btn:hover { background: #3b82f6; color: #fff; }

  .slide-mini .mini-num {
    position: absolute; top: 4px; left: 6px;
    font-size: 7px; color: #333; font-weight: 700;
  }

  .add-slide-mini {
    width: 200px; height: 50px;
    background: transparent; border: 1px dashed #2a2a3e; border-radius: 6px;
    color: #333; font-size: 11px; cursor: pointer; display: flex;
    align-items: center; justify-content: center;
  }
  .add-slide-mini:hover { border-color: #3b82f6; color: #3b82f6; }

  .add-col {
    min-width: 60px; height: 112px;
    background: transparent; border: 2px dashed #1a1a2e; border-radius: 6px;
    color: #222; font-size: 20px; cursor: pointer; display: flex;
    align-items: center; justify-content: center; margin-top: 28px;
  }
  .add-col:hover { border-color: #3b82f6; color: #3b82f6; }

  /* ════════════════════════════════════════ */
  /* DETAIL PANEL — slides in from right     */
  /* ════════════════════════════════════════ */
  .panel-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    z-index: 200; display: none;
  }
  .panel-overlay.open { display: block; }

  .panel {
    position: fixed; top: 0; right: 0; width: 480px; height: 100vh;
    background: #111122; border-left: 1px solid #2a2a3e;
    z-index: 201; overflow-y: auto; padding: 20px;
    transform: translateX(100%); transition: transform 0.2s;
  }
  .panel-overlay.open .panel { transform: translateX(0); }

  .panel h2 { font-size: 16px; margin-bottom: 16px; color: #64b5f6; }
  .panel .close-btn {
    position: absolute; top: 12px; right: 12px;
    background: transparent; border: none; color: #666; font-size: 20px; cursor: pointer;
  }

  .field { margin-bottom: 14px; }
  .field label {
    display: block; font-size: 11px; color: #555; margin-bottom: 4px;
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  .field input, .field textarea, .field select {
    width: 100%; background: #0a0a1a; border: 1px solid #2a2a3e;
    color: #ddd; border-radius: 6px; padding: 8px 10px;
    font-family: inherit; font-size: 13px; outline: none;
  }
  .field input:focus, .field textarea:focus { border-color: #3b82f6; }
  .field textarea { resize: vertical; min-height: 80px; line-height: 1.5; }

  .field-row { display: flex; gap: 10px; }
  .field-row .field { flex: 1; }

  .field.instructions textarea {
    border-color: #f59e0b44; background: #1a1508;
    color: #f59e0b; font-size: 12px;
  }
  .field.instructions label { color: #f59e0b; }

  .panel-actions {
    display: flex; gap: 8px; margin-top: 16px; padding-top: 12px;
    border-top: 1px solid #222;
  }
  .panel-actions button {
    padding: 8px 14px; border-radius: 6px; border: 1px solid #333;
    background: #1a1a2e; color: #aaa; cursor: pointer; font-size: 12px;
  }
  .panel-actions button:hover { background: #2a2a4e; color: #fff; }
  .panel-actions button.danger { border-color: #7f1d1d; color: #f87171; }
  .panel-actions button.danger:hover { background: #7f1d1d; }

  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: #2563eb; color: #fff; padding: 10px 20px; border-radius: 8px;
    font-size: 13px; opacity: 0; transition: opacity 0.3s; z-index: 300;
  }
  .toast.show { opacity: 1; }

  .drag-over { border-color: #3b82f6 !important; }
</style>
</head>
<body>

<header>
  <h1>Slide Editor</h1>
  <span style="font-size:11px;color:#444;">click slide to quick-edit · corner arrow for full details</span>
  <div class="spacer"></div>
  <button onclick="loadFromFile()">Import JSON</button>
  <button onclick="reseed()">Reset to Current</button>
  <button onclick="exportJSON()" class="primary">Save JSON (Ctrl+S)</button>
  <button onclick="window.open('index.html','_blank')">Preview Slides</button>
</header>

<div class="grid" id="grid"></div>

<div class="panel-overlay" id="panelOverlay" onclick="closePanel(event)">
  <div class="panel" id="panel" onclick="event.stopPropagation()">
    <button class="close-btn" onclick="closePanel()">&times;</button>
    <div id="panelContent"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="fileInput" accept=".json" style="display:none">

<script>
let data = { sections: [] };
let dirty = false;
let activeSlide = null; // {si, sli}

function init() {
  const saved = localStorage.getItem('slide-editor-data');
  if (saved) { try { data = JSON.parse(saved); } catch(e) {} }
  if (!data.sections || data.sections.length === 0) seedFromPresentation();
  render();
}

function render() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  data.sections.forEach((section, si) => {
    const col = document.createElement('div');
    col.className = 'col';
    col.dataset.si = si;

    col.innerHTML = `
      <div class="col-num">${si + 1}</div>
      <div class="col-label" onclick="editSectionTitle(${si})" title="Click to rename">${esc(section.title)}</div>
      <div class="section-arrows">
        <button onclick="moveSection(${si}, -1)" title="Move section left" ${si === 0 ? 'disabled' : ''}>←</button>
        <button onclick="moveSection(${si}, 1)" title="Move section right" ${si === data.sections.length - 1 ? 'disabled' : ''}>→</button>
        <button onclick="deleteSection(${si})" title="Delete section" style="color:#f87171;border-color:#7f1d1d;">✕</button>
      </div>
    `;

    // Slide cards
    section.slides.forEach((slide, sli) => {
      const card = document.createElement('div');
      card.className = 'slide-mini' + (slide.instructions ? ' has-instructions' : '') + (slide.edited ? ' edited' : '');
      card.dataset.si = si;
      card.dataset.sli = sli;
      card.draggable = true;

      const bodyPreview = (slide.body || '').split('\n').slice(0, 4).join('\n');
      card.innerHTML = `
        <span class="mini-num">${sli === 0 ? '→' : '↓'} ${si+1}.${sli+1}</span>
        <button class="expand-btn" onclick="event.stopPropagation(); openPanel(${si},${sli})" title="Full editor">⤢</button>
        <div class="mini-heading">${esc(slide.heading || '(no heading)')}</div>
        <div class="mini-body">${esc(bodyPreview)}</div>
        ${slide.image ? `<div class="mini-img">📷 ${slide.image.split('/').pop()}</div>` : ''}
        <div class="mini-badges">
          ${slide.layout ? `<span class="mini-badge layout">${slide.layout}</span>` : ''}
          ${slide.transition ? `<span class="mini-badge transition">${slide.transition}</span>` : ''}
          ${slide.instructions ? `<span class="mini-badge instruction">📝</span>` : ''}
          ${slide.edited ? `<span class="mini-badge edited">edited</span>` : ''}
        </div>
      `;

      card.addEventListener('click', () => quickEdit(si, sli));
      card.addEventListener('dragstart', e => {
        e.dataTransfer.setData('text/plain', JSON.stringify({si, sli}));
        card.style.opacity = '0.4';
      });
      card.addEventListener('dragend', () => card.style.opacity = '1');
      card.addEventListener('dragover', e => { e.preventDefault(); card.classList.add('drag-over'); });
      card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
      card.addEventListener('drop', e => {
        e.preventDefault(); card.classList.remove('drag-over');
        const from = JSON.parse(e.dataTransfer.getData('text/plain'));
        dropSlide(from, {si, sli});
      });

      col.appendChild(card);
    });

    // Add slide button
    const addBtn = document.createElement('div');
    addBtn.className = 'add-slide-mini';
    addBtn.textContent = '+ slide ↓';
    addBtn.onclick = () => { addSlide(si); };
    addBtn.addEventListener('dragover', e => { e.preventDefault(); addBtn.classList.add('drag-over'); });
    addBtn.addEventListener('dragleave', () => addBtn.classList.remove('drag-over'));
    addBtn.addEventListener('drop', e => {
      e.preventDefault(); addBtn.classList.remove('drag-over');
      const from = JSON.parse(e.dataTransfer.getData('text/plain'));
      dropSlide(from, {si, sli: section.slides.length});
    });
    col.appendChild(addBtn);

    grid.appendChild(col);
  });

  // Add section column
  const addCol = document.createElement('div');
  addCol.className = 'add-col';
  addCol.textContent = '+';
  addCol.title = 'Add section →';
  addCol.onclick = addSection;
  grid.appendChild(addCol);
}

// ════════════════════════════════════════
// QUICK EDIT — inline popover
// ════════════════════════════════════════
function quickEdit(si, sli) {
  const slide = data.sections[si].slides[sli];

  // Reuse panel for quick mode
  const overlay = document.getElementById('panelOverlay');
  const content = document.getElementById('panelContent');

  content.innerHTML = `
    <h2>
      <span style="color:#333;">§${si+1}</span> ${esc(data.sections[si].title)}
      <span style="color:#333;">→</span> Slide ${sli+1}
    </h2>

    <div class="field">
      <label>Heading</label>
      <input id="qe-heading" value="${esc(slide.heading || '')}" onkeydown="if(event.key==='Enter')saveQuick(${si},${sli})">
    </div>
    <div class="field">
      <label>Subheading</label>
      <input id="qe-sub" value="${esc(slide.subheading || '')}">
    </div>
    <div class="field">
      <label>Body text (line breaks preserved)</label>
      <textarea id="qe-body" rows="5">${esc(slide.body || '')}</textarea>
    </div>
    <div class="field instructions">
      <label>Instructions for Claude ✨</label>
      <textarea id="qe-instructions" rows="3" placeholder="Tell me what to do with this slide... e.g. 'make this a quote slide with dramatic reveal' or 'add a screenshot of the cosmos view here'">${esc(slide.instructions || '')}</textarea>
    </div>

    <div style="margin-top:10px; padding:10px; background:#0a0a15; border-radius:6px; font-size:11px; color:#444;">
      <div><b style="color:#555;">Layout:</b> ${slide.layout || 'default'} · <b style="color:#555;">Transition:</b> ${slide.transition || 'default'}</div>
      ${slide.image ? `<div><b style="color:#555;">Image:</b> ${slide.image}</div>` : ''}
      ${slide.link ? `<div><b style="color:#555;">Link:</b> ${slide.link}</div>` : ''}
      ${slide.notes ? `<div><b style="color:#555;">Notes:</b> ${slide.notes}</div>` : ''}
      ${slide.edited ? `<div style="color:#4ade80;">✓ Edited ${new Date(slide.edited).toLocaleString()}</div>` : ''}
      <div style="margin-top:6px;"><a href="#" onclick="event.preventDefault(); openPanel(${si},${sli})" style="color:#3b82f6;">Open full editor →</a></div>
    </div>

    <div class="panel-actions">
      <button onclick="saveQuick(${si},${sli})" style="background:#2563eb;color:#fff;">Save</button>
      <button onclick="duplicateSlide(${si},${sli})">Duplicate</button>
      <button onclick="insertSlideAfter(${si},${sli})">+ Insert After</button>
      <button onclick="insertSlideBefore(${si},${sli})">+ Insert Before</button>
      <button class="danger" onclick="deleteSlide(${si},${sli})">Delete</button>
    </div>
  `;

  overlay.classList.add('open');
  document.getElementById('qe-heading').focus();
}

function saveQuick(si, sli) {
  const slide = data.sections[si].slides[sli];
  slide.heading = document.getElementById('qe-heading').value;
  slide.subheading = document.getElementById('qe-sub').value;
  slide.body = document.getElementById('qe-body').value;
  slide.instructions = document.getElementById('qe-instructions').value;
  slide.edited = new Date().toISOString();
  slide.editedBy = 'victor';
  markDirty();
  closePanel();
  render();
}

// ════════════════════════════════════════
// FULL PANEL EDITOR
// ════════════════════════════════════════
const LAYOUTS = ['default','center-text','side-by-side','image-full','quote','stats','cards','prompt-demo','custom-html'];
const TRANSITIONS = ['','slide','fade','convex','zoom','none'];

function openPanel(si, sli) {
  const slide = data.sections[si].slides[sli];
  const content = document.getElementById('panelContent');

  content.innerHTML = `
    <h2>Full Editor — §${si+1}.${sli+1}</h2>

    <div class="field-row">
      <div class="field">
        <label>Layout</label>
        <select id="pe-layout">
          ${LAYOUTS.map(l => `<option value="${l}" ${slide.layout===l?'selected':''}>${l}</option>`).join('')}
        </select>
      </div>
      <div class="field">
        <label>Transition</label>
        <select id="pe-transition">
          ${TRANSITIONS.map(t => `<option value="${t}" ${slide.transition===t?'selected':''}>${t || '(default)'}</option>`).join('')}
        </select>
      </div>
    </div>

    <div class="field">
      <label>Heading</label>
      <input id="pe-heading" value="${esc(slide.heading || '')}">
    </div>
    <div class="field">
      <label>Subheading</label>
      <input id="pe-sub" value="${esc(slide.subheading || '')}">
    </div>
    <div class="field">
      <label>Body</label>
      <textarea id="pe-body" rows="6">${esc(slide.body || '')}</textarea>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Image path</label>
        <input id="pe-image" value="${esc(slide.image || '')}" placeholder="img/example.png">
      </div>
      <div class="field">
        <label>Link / URL</label>
        <input id="pe-link" value="${esc(slide.link || '')}" placeholder="https://...">
      </div>
    </div>
    <div class="field">
      <label>Background</label>
      <input id="pe-bg" value="${esc(slide.background || '')}" placeholder="gradient, image path, or color">
    </div>
    <div class="field">
      <label>Speaker Notes</label>
      <textarea id="pe-notes" rows="2" style="font-size:12px;color:#888;">${esc(slide.notes || '')}</textarea>
    </div>
    <div class="field instructions">
      <label>Instructions for Claude ✨</label>
      <textarea id="pe-instructions" rows="3" placeholder="What should Claude do with this slide?">${esc(slide.instructions || '')}</textarea>
    </div>
    <div class="field">
      <label>Custom HTML (only if layout = custom-html)</label>
      <textarea id="pe-html" rows="4" style="font-family:monospace;font-size:11px;">${esc(slide.customHtml || '')}</textarea>
    </div>

    <div class="panel-actions">
      <button onclick="savePanel(${si},${sli})" style="background:#2563eb;color:#fff;">Save</button>
      <button onclick="duplicateSlide(${si},${sli})">Duplicate</button>
      <button class="danger" onclick="deleteSlide(${si},${sli})">Delete</button>
    </div>
  `;

  document.getElementById('panelOverlay').classList.add('open');
}

function savePanel(si, sli) {
  const slide = data.sections[si].slides[sli];
  slide.layout = document.getElementById('pe-layout').value;
  slide.transition = document.getElementById('pe-transition').value;
  slide.heading = document.getElementById('pe-heading').value;
  slide.subheading = document.getElementById('pe-sub').value;
  slide.body = document.getElementById('pe-body').value;
  slide.image = document.getElementById('pe-image').value;
  slide.link = document.getElementById('pe-link').value;
  slide.background = document.getElementById('pe-bg').value;
  slide.notes = document.getElementById('pe-notes').value;
  slide.instructions = document.getElementById('pe-instructions').value;
  slide.edited = new Date().toISOString();
  slide.editedBy = 'victor';
  slide.customHtml = document.getElementById('pe-html').value;
  markDirty();
  closePanel();
  render();
}

function closePanel(e) {
  if (e && e.target !== document.getElementById('panelOverlay')) return;
  document.getElementById('panelOverlay').classList.remove('open');
}

// ════════════════════════════════════════
// CRUD
// ════════════════════════════════════════
function addSection() {
  data.sections.push({ title: 'New Section', slides: [{ layout:'center-text', heading:'New Slide', body:'', instructions:'' }]});
  markDirty(); render();
}

function moveSection(si, dir) {
  const to = si + dir;
  if (to < 0 || to >= data.sections.length) return;
  const [section] = data.sections.splice(si, 1);
  data.sections.splice(to, 0, section);
  markDirty(); render();
  toast(`Moved "${section.title}" to position ${to + 1}`);
}

function deleteSection(si) {
  if (!confirm(`Delete section "${data.sections[si].title}" and all its slides?`)) return;
  data.sections.splice(si, 1);
  markDirty(); render();
}

function addSlide(si) {
  data.sections[si].slides.push({ layout:'default', heading:'', body:'', instructions:'' });
  markDirty(); render();
}

function insertSlideAfter(si, sli) {
  data.sections[si].slides.splice(sli + 1, 0, { layout:'default', heading:'', body:'', instructions:'' });
  markDirty(); closePanel(); render();
}

function insertSlideBefore(si, sli) {
  data.sections[si].slides.splice(sli, 0, { layout:'default', heading:'', body:'', instructions:'' });
  markDirty(); closePanel(); render();
}

function deleteSlide(si, sli) {
  if (data.sections[si].slides.length <= 1) {
    if (confirm(`Delete entire section "${data.sections[si].title}"?`)) {
      data.sections.splice(si, 1);
      markDirty(); closePanel(); render();
    }
    return;
  }
  data.sections[si].slides.splice(sli, 1);
  markDirty(); closePanel(); render();
}

function duplicateSlide(si, sli) {
  const copy = JSON.parse(JSON.stringify(data.sections[si].slides[sli]));
  copy.instructions = '(duplicated) ' + (copy.instructions || '');
  data.sections[si].slides.splice(sli + 1, 0, copy);
  markDirty(); closePanel(); render();
}

function dropSlide(from, to) {
  const slide = data.sections[from.si].slides.splice(from.sli, 1)[0];
  if (data.sections[from.si].slides.length === 0) data.sections.splice(from.si, 1);
  // Recalc target index after removal
  let tsi = to.si, tsli = to.sli;
  if (from.si < to.si || (from.si === to.si && from.sli < to.sli)) {
    // Adjust for removed item
    if (from.si === to.si) tsli = Math.max(0, tsli - 1);
    else if (data.sections[from.si] && data.sections[from.si].slides.length === 0) tsi = Math.max(0, tsi - 1);
  }
  if (!data.sections[tsi]) return;
  data.sections[tsi].slides.splice(tsli, 0, slide);
  markDirty(); render();
}

function editSectionTitle(si) {
  const title = prompt('Section title:', data.sections[si].title);
  if (title !== null) { data.sections[si].title = title; markDirty(); render(); }
}

// ════════════════════════════════════════
// SAVE / LOAD
// ════════════════════════════════════════
function markDirty() {
  dirty = true;
  localStorage.setItem('slide-editor-data', JSON.stringify(data, null, 2));
}

function exportJSON() {
  localStorage.setItem('slide-editor-data', JSON.stringify(data, null, 2));
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'slides.json';
  a.click();
  dirty = false;
  toast('Saved slides.json');
}

function loadFromFile() {
  document.getElementById('fileInput').click();
}
document.getElementById('fileInput').addEventListener('change', e => {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      data = JSON.parse(ev.target.result);
      localStorage.setItem('slide-editor-data', JSON.stringify(data, null, 2));
      render(); toast('Imported ' + file.name);
    } catch(err) { alert('Invalid JSON: ' + err.message); }
  };
  reader.readAsText(file);
});

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function reseed() {
  if (!confirm('Reset editor to match current presentation? Your edits will be lost.')) return;
  localStorage.removeItem('slide-editor-data');
  seedFromPresentation();
  localStorage.setItem('slide-editor-data', JSON.stringify(data, null, 2));
  render();
  toast('Reset to current presentation');
}

window.addEventListener('beforeunload', e => { if(dirty){e.preventDefault();e.returnValue='';} });
document.addEventListener('keydown', e => {
  if ((e.ctrlKey||e.metaKey) && e.key === 's') { e.preventDefault(); exportJSON(); }
  if (e.key === 'Escape') closePanel();
});
